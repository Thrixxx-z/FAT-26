<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin: 0;
}

nav {
    position: fixed;
    width: 100%;
    background: black;
    color: white;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#sec1 { background: red; }
#sec2 { background: green; }
#sec3 { background: gray; height: 200px; }

</style>
</head>
<body>

<nav>
    <a href="#sec1">Sección 1</a>
    <a href="#sec2">Sección 2</a>
    <a href="#sec3">Footer</a>
</nav>

<section id="sec1">Sección 1</section>
<section id="sec2">Sección 2</section>
<section id="sec3">Footer</section>

</body>
</html>
